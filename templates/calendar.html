{% extends "base.html" %}

{% block title %}Vehicle Calendar{% endblock %}

{% block content %}
<h2 class="mb-4">Vehicle Booking Calendar</h2>
<div id="calendar"></div>

<!-- ⭐ The modal MUST be inside content, NOT inside a script tag -->
<div class="modal fade" id="bookingModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Booking Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="bookingModalBody">
        Loading...
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
function openBookingModal(id) {
    console.log("OPEN MODAL FOR:", id);

    fetch(`/booking/${id}`)
        .then(response => response.text())
        .then(html => {
            document.getElementById("bookingModalBody").innerHTML = html;

            var modal = new bootstrap.Modal(document.getElementById("bookingModal"));
            modal.show();
        });
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    console.log("SCRIPT IS RUNNING");

    var calendarEl = document.getElementById("calendar");

    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        height: "auto",
        events: "/api/bookings",

        eventTimeFormat: {
            hour: '2-digit',
            minute: '2-digit',
            meridiem: 'short',
            hour12: true
        },

        eventClick: function(info) {
            console.log("EVENT CLICK FIRED");
            const bookingId = info.event.extendedProps.booking_id;
            console.log("BOOKING ID:", bookingId);
            openBookingModal(bookingId);
        }
    });

    calendar.render();
});
</script>
{% endblock %}
